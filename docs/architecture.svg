<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <style>
      .t   { fill:#0f172a; font-size:15px; font-weight:700; text-anchor:middle; }
      .s   { fill:#475569; font-size:12px; text-anchor:middle; }
      .xs  { fill:#64748b; font-size:10.5px; text-anchor:middle; }
      .lbl { fill:#64748b; font-size:12px; font-style:italic; text-anchor:middle; }
      .ln  { stroke:#475569; stroke-width:2; fill:none; }
      .h1  { fill:#0f172a; font-size:26px; font-weight:800; text-anchor:middle; }
      .h2  { fill:#475569; font-size:14px; text-anchor:middle; }
      .ft  { fill:#334155; font-size:13px; font-style:italic; text-anchor:middle; }
      .sec { fill:#0f172a; font-size:13px; font-weight:700; text-anchor:middle; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1600" fill="#ffffff"/>

  <text class="h1" x="800" y="52">prod-gemini-agent — a governed production agent over Gemini 2.0 Flash</text>
  <text class="h2" x="800" y="84">Same batch task, two scenes: a raw notebook agent vs the governed run. Seven small governance pieces, each mirroring a published lib.</text>

  <!-- inputs -->
  <rect x="180" y="150" width="360" height="110" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text class="t" x="360" y="190">Batch input</text>
  <text class="s" x="360" y="214">(doc-id, prompt) × N tasks</text>

  <rect x="720" y="150" width="360" height="110" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
  <text class="t" x="900" y="190">Fleet</text>
  <text class="s" x="900" y="214">concurrent batch dispatch</text>
  <text class="xs" x="900" y="234">bounded parallelism</text>

  <line class="ln" x1="540" y1="205" x2="720" y2="205" marker-end="url(#arr)"/>

  <!-- fleet -> pipeline elbow -->
  <path class="ln" d="M900,260 L900,295 L172,295 L172,338" marker-end="url(#arr)"/>
  <text class="lbl" x="540" y="285">for each task</text>

  <!-- per-call pipeline label -->
  <text class="sec" x="800" y="324">Per-call governance pipeline — each Gemini call passes through, in order</text>

  <!-- 6 pipeline boxes -->
  <rect x="60" y="340" width="224" height="128" rx="9" fill="#f1f5f9" stroke="#334155" stroke-width="1.6"/>
  <text class="t" x="172" y="378">Cache</text>
  <text class="s" x="172" y="402">hit → skip call</text>
  <text class="xs" x="172" y="424">hit-ratio stats</text>

  <rect x="311" y="340" width="224" height="128" rx="9" fill="#ecfdf5" stroke="#059669" stroke-width="1.8"/>
  <text class="t" x="423" y="378">Budget</text>
  <text class="s" x="423" y="402">sliding USD cap</text>
  <text class="xs" x="423" y="424">block if &gt; $0.05</text>

  <rect x="562" y="340" width="224" height="128" rx="9" fill="#f1f5f9" stroke="#334155" stroke-width="1.6"/>
  <text class="t" x="674" y="378">Breaker</text>
  <text class="s" x="674" y="402">CLOSED / OPEN /</text>
  <text class="xs" x="674" y="424">HALF_OPEN</text>

  <rect x="813" y="340" width="224" height="128" rx="9" fill="#f1f5f9" stroke="#334155" stroke-width="1.6"/>
  <text class="t" x="925" y="378">Retry</text>
  <text class="s" x="925" y="402">exponential backoff</text>
  <text class="xs" x="925" y="424">+ jitter on transient</text>

  <rect x="1064" y="340" width="224" height="128" rx="9" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
  <text class="t" x="1176" y="378">Gemini call</text>
  <text class="s" x="1176" y="402">Fake | GeminiClient</text>
  <text class="xs" x="1176" y="424">+ cost math</text>

  <rect x="1315" y="340" width="224" height="128" rx="9" fill="#f1f5f9" stroke="#334155" stroke-width="1.6"/>
  <text class="t" x="1427" y="378">Trace</text>
  <text class="s" x="1427" y="402">per-call audit</text>
  <text class="xs" x="1427" y="424">p50 / p95 report</text>

  <line class="ln" x1="284" y1="404" x2="311" y2="404" marker-end="url(#arr)"/>
  <line class="ln" x1="535" y1="404" x2="562" y2="404" marker-end="url(#arr)"/>
  <line class="ln" x1="786" y1="404" x2="813" y2="404" marker-end="url(#arr)"/>
  <line class="ln" x1="1037" y1="404" x2="1064" y2="404" marker-end="url(#arr)"/>
  <line class="ln" x1="1288" y1="404" x2="1315" y2="404" marker-end="url(#arr)"/>

  <!-- outputs -->
  <path class="ln" d="M1427,468 L1427,508 L740,508 L740,548" marker-end="url(#arr)"/>
  <path class="ln" d="M1427,468 L1427,548" marker-end="url(#arr)"/>

  <rect x="420" y="550" width="600" height="100" rx="9" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
  <text class="t" x="720" y="586">Report</text>
  <text class="s" x="720" y="610">calls · success · total USD · retries · cache hits</text>
  <text class="xs" x="720" y="632">breaker trips · budget remaining · latency p50/p95</text>

  <rect x="1090" y="550" width="420" height="100" rx="9" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
  <text class="t" x="1300" y="586">Audit log (on disk)</text>
  <text class="s" x="1300" y="612">per-call trace, replayable</text>

  <!-- contrast -->
  <text class="sec" x="800" y="722">Same input, same 18% transient-failure rate — two outcomes</text>

  <rect x="120" y="740" width="620" height="150" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text class="t" x="430" y="780" fill="#b91c1c">Raw notebook agent</text>
  <text class="s" x="430" y="808">20 calls → 14 ok, 6 dropped</text>
  <text class="xs" x="430" y="832">no retries · no budget · no cache · no audit</text>
  <text class="xs" x="430" y="858">six summaries silently lost</text>

  <text class="t" x="800" y="822">vs</text>

  <rect x="860" y="740" width="620" height="150" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2.5"/>
  <text class="t" x="1170" y="780" fill="#065f46">ProductionAgent (governed)</text>
  <text class="s" x="1170" y="808">20 calls → 20 ok, 0 dropped</text>
  <text class="xs" x="1170" y="832">spend hard-capped at $0.05 · 8 retries</text>
  <text class="xs" x="1170" y="858">cache saved spend · full audit on disk</text>

  <text class="ft" x="800" y="958">Seven small pieces — fleet · retry · breaker · budget · cache · trace · cost — each under 400 LOC, each mirroring a published library, composed into one agent.</text>
</svg>
